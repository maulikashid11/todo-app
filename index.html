<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <main>
        <div class="card">
            <h1>Todos</h1>
            <div class="progress-bar">
                <span>2/3 completed</span>
                <div class="progress-bar-completed"></div>
            </div>
            <div class="error">Please add all todos</div>
            <div class="todos">
                <div class="checkbox"></div>
                <input type="text" id="first" placeholder="Add new todo">
            </div>
            <div class="todos">
                <div class="checkbox"></div>
                <input type="text" id="second" placeholder="Add new todo">
            </div>
            <div class="todos">
                <div class="checkbox"></div>
                <input type="text" id="third" placeholder="Add new todo">
            </div>
        </div>
    </main>
</body>

</html>
